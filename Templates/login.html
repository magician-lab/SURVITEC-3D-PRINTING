<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

/* =========================
RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* =========================
BACKGROUND
========================= */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
    overflow: hidden;
}

/* floating glow blobs */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
}

body::before {
    background: #60a5fa;
    top: -100px;
    left: -100px;
}

body::after {
    background: #a78bfa;
    bottom: -100px;
    right: -100px;
}

/* =========================
CARD
========================= */
.container {
    width: 420px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    z-index: 1;
    color: white;
}

/* =========================
HEADER
========================= */
.header {
    text-align: center;
    margin-bottom: 25px;
}

.header i {
    font-size: 50px;
    margin-bottom: 10px;
    color: #fff;
}

.header h2 {
    font-size: 24px;
    margin-bottom: 5px;
}

.header p {
    font-size: 13px;
    opacity: 0.8;
}

/* =========================
FLASH
========================= */
.flash {
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
    font-size: 13px;
}

.flash.success { background: rgba(34,197,94,0.2); }
.flash.error { background: rgba(239,68,68,0.2); }
.flash.warning { background: rgba(245,158,11,0.2); }

/* =========================
INPUT
========================= */
.input-group {
    position: relative;
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 14px 45px 14px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    transition: 0.3s;
}

.input-group input::placeholder {
    color: rgba(255,255,255,0.6);
}

.input-group input:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 10px rgba(96,165,250,0.5);
}

/* icons */
.input-group i {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
}

/* =========================
BUTTON
========================= */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* =========================
FOOTER
========================= */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}

/* =========================
RESPONSIVE
========================= */
@media(max-width:500px){
    .container{
        width: 90%;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <i class="fas fa-shield-alt"></i>
        <h2>Secure Login</h2>
        <p>Access your dashboard safely</p>
    </div>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <!-- FORM -->
    <form method="POST">

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
            <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fas fa-eye" onclick="togglePassword()"></i>
        </div>

        <button type="submit">
            <i class="fas fa-right-to-bracket"></i> Login
        </button>

    </form>

    <div class="footer">
        SURVITEC 3D SYSTEM • Secure Access Portal
    </div>

</div>

<script>
function togglePassword(){
    let p = document.getElementById("password");
    p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
